                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);" x-text="t('templates.select_template')">
                </label>
                <select 
                    x-model="modals.template.selected"
                    class="w-full px-3 py-2 rounded border"
                    style="background-color: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-primary);"
                >
                    <option value="" x-text="'-- ' + t('templates.choose_template') + ' --'"></option>
                    <template x-for="template in modals.template.available" :key="template.name">
                        <option :value="template.name" x-text="template.name"></option>
                    </template>
                </select>
            </div>
            
            <!-- Note Name Input -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);" x-text="t('templates.note_name')">
                </label>
                <input 
                    x-model="modals.template.newNoteName"
                    type="text"
                    :placeholder="t('notes.prompt_name')"
                    class="w-full px-3 py-2 rounded border"
                    style="background-color: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-primary);"
                    @keydown.enter="createNoteFromTemplate()"
                />
            </div>
            
            <!-- Info about placeholders -->
            <div class="mb-4 text-xs p-3 rounded" style="background-color: var(--bg-tertiary); color: var(--text-secondary);">
                <strong x-text="t('templates.available_placeholders') + ':'"></strong><br>
                <code style="font-family: monospace;">{{date}}</code>, 
                <code style="font-family: monospace;">{{time}}</code>, 
                <code style="font-family: monospace;">{{datetime}}</code>, 
                <code style="font-family: monospace;">{{year}}</code>, 
                <code style="font-family: monospace;">{{month}}</code>, 
                <code style="font-family: monospace;">{{day}}</code>, 
                <code style="font-family: monospace;">{{title}}</code>, 
                <code style="font-family: monospace;">{{folder}}</code>
            </div>
            
            <!-- Empty state when no templates available -->
            <div x-show="modals.template.available.length === 0" class="mb-4 text-sm p-3 rounded" style="background-color: var(--bg-tertiary); color: var(--text-secondary);" x-text="t('templates.no_templates')">
            </div>
            
            <!-- Actions -->
            <div class="flex gap-2">
                <button 
                    @click="createNoteFromTemplate()"
                    :disabled="!modals.template.selected || !modals.template.newNoteName.trim() || modals.template.available.length === 0"
                    class="flex-1 px-4 py-2 rounded font-medium text-white transition-colors"
                    style="background-color: var(--accent-primary);"
                    :style="(!modals.template.selected || !modals.template.newNoteName.trim() || modals.template.available.length === 0) ? 'opacity: 0.5; cursor: not-allowed;' : ''"
                    onmouseover="if(!this.disabled) this.style.backgroundColor='var(--accent-hover)'"
                    onmouseout="if(!this.disabled) this.style.backgroundColor='var(--accent-primary)'"
                    x-text="t('templates.create_note')"
                >
                </button>
                <button 
                    @click="modals.template.show = false; modals.template.selected = ''; modals.template.newNoteName = ''"
                    class="flex-1 px-4 py-2 rounded font-medium transition-colors"
                    style="background-color: var(--bg-tertiary); color: var(--text-primary);"
                    onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                    onmouseout="this.style.backgroundColor='var(--bg-tertiary)'"
                    x-text="t('common.cancel')"
                >
                </button>
            </div>
        </div>
    </div>
    
    <!-- Quick Switcher Modal (Ctrl+K) -->
    <div x-show="modals.quickSwitcher.show" 
         @click.self="closeQuickSwitcher()"
         @keydown.escape.window="modals.quickSwitcher.show && closeQuickSwitcher()"
         x-effect="if (modals.quickSwitcher.show) { modals.quickSwitcher.results = filterQuickSwitcher(modals.quickSwitcher.query); modals.quickSwitcher.index = 0; }"
         class="fixed inset-0 flex items-start justify-center pt-24"
         style="background-color: rgba(0, 0, 0, 0.5); z-index: 1200;"
         x-cloak>
        <div class="rounded-lg shadow-2xl w-full max-w-lg mx-4 overflow-hidden"
             style="background-color: var(--bg-primary); border: 1px solid var(--border-primary);"
             @click.stop>
            
            <!-- Search Input -->
            <div class="p-3 border-b" style="border-color: var(--border-primary);">
                <input id="quickSwitcherInput"
                       type="text"
                       x-model="modals.quickSwitcher.query"
                       @keydown="handleQuickSwitcherKeydown($event)"
                       :placeholder="t('quick_switcher.placeholder')"
                       class="w-full px-3 py-2 rounded text-base outline-none"
                       style="background-color: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-primary);"
                       autocomplete="off">
            </div>
            
            <!-- Results List -->
            <div id="modals.quickSwitcher.results" class="max-h-80 overflow-y-auto">
                <template x-if="modals.quickSwitcher.results.length === 0">
                    <div class="p-4 text-center text-sm" style="color: var(--text-secondary);">
                        <span x-text="t('quick_switcher.no_results')"></span>
                    </div>
                </template>
                <template x-for="(note, index) in modals.quickSwitcher.results" :key="note.path">
                    <div @click="selectQuickSwitcherNote(note)"
                         data-quick-switcher-item
                         :class="index === modals.quickSwitcher.index ? 'quick-switcher-selected' : ''"
                         class="px-4 py-3 cursor-pointer flex items-center gap-3 transition-colors"
                         :style="index === modals.quickSwitcher.index ? 'background-color: var(--bg-tertiary);' : ''"
                         @mouseenter="modals.quickSwitcher.index = index">
                        <!-- Note icon -->
                        <svg class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <div class="flex-1 min-w-0">
                            <div class="font-medium truncate" style="color: var(--text-primary);" x-text="note.name" :title="note.name"></div>
                            <div class="text-xs truncate" style="color: var(--text-secondary);" x-show="note.folder" x-text="note.folder" :title="note.folder"></div>
                        </div>
                    </div>
                </template>
                
                <!-- Recent notes hint (only when no query typed) -->
                <div x-show="!modals.quickSwitcher.query.trim() && modals.quickSwitcher.results.length > 0" 
                     class="px-4 py-2 text-xs text-center italic"
                     style="color: var(--text-secondary);">
                    <span x-text="t('quick_switcher.recent_hint')"></span>
                </div>
            </div>
            
            <!-- Footer hint -->
            <div class="px-4 py-2 text-xs border-t flex gap-4" style="border-color: var(--border-primary); color: var(--text-secondary); background-color: var(--bg-secondary);">
                <span>↑↓ <span x-text="t('quick_switcher.navigate')"></span></span>
                <span>↵ <span x-text="t('quick_switcher.open')"></span></span>
                <span>esc <span x-text="t('quick_switcher.close')"></span></span>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div x-show="modals.share.show" 
         @click.self="closeShareModal()"
         @keydown.escape.window="modals.share.show && closeShareModal()"
         class="fixed inset-0 flex items-center justify-center"
         style="background-color: rgba(0, 0, 0, 0.5); z-index: 1100;"
         x-cloak>
        <div class="rounded-lg shadow-xl p-6 max-w-md w-full mx-4"
             style="background-color: var(--bg-secondary); color: var(--text-primary);"
             @click.stop>
            
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2" style="color: var(--text-primary);">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                </svg>
                <span x-text="t('share.modal_title')"></span>
            </h2>
            
            <!-- Loading state -->
            <div x-show="modals.share.loading" class="text-center py-4">
                <span x-text="t('common.loading')"></span>
            </div>
            
            <!-- Not shared state -->
            <div x-show="!modals.share.loading && !modals.share.info?.shared">
                <p class="mb-4 text-sm" style="color: var(--text-secondary);" x-text="t('share.not_shared_description')"></p>
                <button 
                    @click="createShareLink()"
                    class="w-full px-4 py-2 rounded font-medium text-white transition-colors"
                    style="background-color: var(--accent-primary);"
                    onmouseover="this.style.backgroundColor='var(--accent-hover)'"
                    onmouseout="this.style.backgroundColor='var(--accent-primary)'"
                    x-text="t('share.create_link')"
                >
                </button>
            </div>
            
            <!-- Shared state -->
            <div x-show="!modals.share.loading && modals.share.info?.shared">
                <p class="mb-2 text-sm" style="color: var(--text-secondary);" x-text="t('share.shared_description')"></p>
                
                <!-- Share URL -->
                <div class="flex gap-2 mb-4">
                    <input 
                        type="text"
                        :value="modals.share.info?.url || ''"
                        readonly
                        class="flex-1 px-3 py-2 rounded border text-sm"
                        style="background-color: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-primary);"
                        @click="$el.select()"
                    />
                    <button 
                        @click="copyShareLink()"
                        class="px-3 py-2 rounded font-medium text-white transition-colors flex items-center gap-1"
                        :style="modals.share.linkCopied ? 'background-color: var(--success, #22c55e);' : 'background-color: var(--accent-primary);'"
                        onmouseover="if(!this.classList.contains('copied')) this.style.backgroundColor='var(--accent-hover)'"
                        onmouseout="if(!this.classList.contains('copied')) this.style.backgroundColor='var(--accent-primary)'"
                    >
                        <svg x-show="!modals.share.linkCopied" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        <svg x-show="modals.share.linkCopied" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span x-text="modals.share.linkCopied ? t('common.copied') : t('share.copy')"></span>
                    </button>
                </div>
                
                <!-- QR Code -->
                <div class="mb-4 flex flex-col items-center">
                    <button 
                        @click="modals.share.showQR = !modals.share.showQR"
                        class="text-sm flex items-center gap-1 mb-2 transition-colors"
                        style="color: var(--text-secondary);"
                        onmouseover="this.style.color='var(--text-primary)'"
                        onmouseout="this.style.color='var(--text-secondary)'"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                        </svg>
                        <span x-text="modals.share.showQR ? t('share.hide_qr') : t('share.show_qr')"></span>
                        <svg class="w-3 h-3 transition-transform" :class="modals.share.showQR ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div x-show="modals.share.showQR" 
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="opacity-0 transform scale-95"
                         x-transition:enter-end="opacity-100 transform scale-100"
                         x-transition:leave="transition ease-in duration-150"
                         x-transition:leave-start="opacity-100 transform scale-100"
                         x-transition:leave-end="opacity-0 transform scale-95"
                         class="p-3 rounded-lg" 
                         style="background-color: white;">
                        <img :src="generateQRCode(modals.share.info?.url)" alt="QR Code" class="w-32 h-32" />
                    </div>
                </div>
                
                <!-- Revoke sharing -->
                <button 
                    @click="revokeShareLink()"
                    class="w-full px-4 py-2 rounded font-medium transition-colors"
                    style="background-color: transparent; color: var(--error); border: 1px solid var(--error);"
                    onmouseover="this.style.backgroundColor='rgba(239, 68, 68, 0.1)'"
                    onmouseout="this.style.backgroundColor='transparent'"
                    x-text="t('share.stop_sharing')"
                >
                </button>
            </div>
            
            <!-- Close button -->
            <div class="mt-4 pt-4 border-t" style="border-color: var(--border-primary);">
                <button 
                    @click="closeShareModal()"
                    class="w-full px-4 py-2 rounded font-medium transition-colors"
                    style="background-color: var(--bg-tertiary); color: var(--text-primary);"
                    onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                    onmouseout="this.style.backgroundColor='var(--bg-tertiary)'"
                    x-text="t('common.close')"
                >
                </button>
            </div>
        </div>
    </div>
    
    <!-- Orphaned Media Cleanup Modal -->
    <div x-show="modals.orphanedMedia.show" 
         @click.self="closeOrphanedMediaModal()"
         @keydown.escape.window="modals.orphanedMedia.show && closeOrphanedMediaModal()"
         class="fixed inset-0 flex items-center justify-center"
         style="background-color: rgba(0, 0, 0, 0.5); z-index: 1100;"
         x-cloak>
        <div class="rounded-lg shadow-xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] flex flex-col"
             style="background-color: var(--bg-secondary); color: var(--text-primary);"
             @click.stop>
            
            <!-- Header -->
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2" style="color: var(--text-primary);">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                <span x-text="t('orphaned_media.title')"></span>
            </h2>
            
            <!-- Scan Button (shown before scan) -->
            <div x-show="!modals.orphanedMedia.scanned && !modals.orphanedMedia.loading" class="mb-4">
                <p class="text-sm mb-4" style="color: var(--text-secondary);" x-text="t('orphaned_media.description')"></p>
                <button 
                    @click="scanOrphanedMedia()"
                    class="px-4 py-2 rounded font-medium text-white transition-colors"
                    style="background-color: var(--accent-primary);"
                    onmouseover="this.style.backgroundColor='var(--accent-hover)'"
                    onmouseout="this.style.backgroundColor='var(--accent-primary)'"
                >
                    <span x-text="t('orphaned_media.scan_button')"></span>
                </button>
            </div>
            
            <!-- Loading State -->
            <div x-show="modals.orphanedMedia.loading" class="text-center py-8">
                <svg class="animate-spin h-8 w-8 mx-auto mb-3" style="color: var(--accent-primary);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p style="color: var(--text-secondary);" x-text="t('common.loading')"></p>
            </div>
            
            <!-- Results Section -->
            <div x-show="modals.orphanedMedia.scanned && !modals.orphanedMedia.loading" class="flex-1 flex flex-col min-h-0">
                <!-- Summary -->
                <div x-show="modals.orphanedMedia.files.length > 0" class="mb-4 p-3 rounded" style="background-color: var(--bg-tertiary);">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium" style="color: var(--text-primary);" x-text="t('orphaned_media.found_count', { count: modals.orphanedMedia.files.length })"></span>
                        <span class="text-sm" style="color: var(--text-secondary);" x-text="formatBytes(modals.orphanedMedia.totalSize)"></span>
                    </div>
                </div>
                
                <!-- Empty State -->
                <div x-show="modals.orphanedMedia.files.length === 0" class="text-center py-8">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-40" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p style="color: var(--text-secondary);" x-text="t('orphaned_media.no_files')"></p>
                </div>
                
                <!-- File List -->
                <div x-show="modals.orphanedMedia.files.length > 0" class="flex-1 overflow-y-auto custom-scrollbar mb-4 border rounded" style="border-color: var(--border-primary); max-height: 300px;">
                    <template x-for="file in modals.orphanedMedia.files" :key="file.path">
                        <div class="flex items-center justify-between px-3 py-2 border-b" style="border-color: var(--border-primary); background-color: var(--bg-primary);">
                            <div class="flex items-center gap-2 min-w-0 flex-1">
                                <!-- Media Type Icon -->
                                <svg x-show="file.type === 'image'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                <svg x-show="file.type === 'video'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                                <svg x-show="file.type === 'audio'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                                </svg>
                                <svg x-show="file.type !== 'image' && file.type !== 'video' && file.type !== 'audio'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                </svg>
                                <span class="text-sm truncate" style="color: var(--text-primary);" x-text="file.filename" :title="file.path"></span>
                            </div>
                            <span class="text-xs flex-shrink-0 ml-2" style="color: var(--text-tertiary);" x-text="formatBytes(file.size)"></span>
                        </div>
                    </template>
                </div>
                
                <!-- Delete All Button -->
                <div x-show="modals.orphanedMedia.files.length > 0" class="flex gap-2">
                    <button 
                        @click="deleteAllOrphanedMedia()"
                        class="flex-1 px-4 py-2 rounded font-medium text-white transition-colors"
                        style="background-color: var(--error);"
                        onmouseover="this.style.backgroundColor='var(--error-hover, #dc2626)'"
                        onmouseout="this.style.backgroundColor='var(--error)'"
                        x-text="t('orphaned_media.delete_all', { count: modals.orphanedMedia.files.length })"
                    >
                    </button>
                    <button 
                        @click="closeOrphanedMediaModal()"
                        class="flex-1 px-4 py-2 rounded font-medium transition-colors"
                        style="background-color: var(--bg-tertiary); color: var(--text-primary);"
                        onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                        onmouseout="this.style.backgroundColor='var(--bg-tertiary)'"
                        x-text="t('common.cancel')"
                    >
                    </button>
                </div>
            </div>
            
            <!-- Close Button (when no results or before scan) -->
            <div x-show="!modals.orphanedMedia.scanned || modals.orphanedMedia.files.length === 0" class="mt-4 pt-4 border-t" style="border-color: var(--border-primary);" x-cloak>
                <button 
                    @click="closeOrphanedMediaModal()"
                    class="w-full px-4 py-2 rounded font-medium transition-colors"
                    style="background-color: var(--bg-tertiary); color: var(--text-primary);"
                    onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                    onmouseout="this.style.backgroundColor='var(--bg-tertiary)'"
                    x-text="t('common.close')"
                >
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Tabs -->
    <nav class="mobile-bottom-tabs zen-hide" style="display: none;" role="navigation" aria-label="Main navigation">
        <button 
            class="mobile-bottom-tab"
            :class="{'active': ui.activePanel === 'files' && (ui.mobileSidebarOpen || (!note.current && !media.current && !graph.show))}"
            @click="mobileFilesTabClick()"
            :aria-label="t('sidebar.files')"
        >
            <!-- Show home icon when viewing content, folder icon when on homepage -->
            <svg x-show="note.current || media.current || graph.show" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <svg x-show="!note.current && !media.current && !graph.show" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
            </svg>
            <span x-text="(note.current || media.current || graph.show) ? t('homepage.title') : t('sidebar.files')"></span>
        </button>
        <button 
            class="mobile-bottom-tab relative"
            :class="{'active': ui.activePanel === 'search' && ui.mobileSidebarOpen}"
            @click="ui.activePanel = 'search'; ui.mobileSidebarOpen = true;"
            :aria-label="t('sidebar.search')"
        >
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <span x-text="t('sidebar.search')"></span>
            <!-- Search results badge -->
            <span 
                x-show="search.query.trim() && search.results.length > 0"
                x-cloak
                class="absolute top-1 right-1/4 w-4 h-4 text-[9px] font-bold rounded-full flex items-center justify-center"
                style="background-color: var(--accent-primary); color: white;"
                x-text="search.results.length > 9 ? '9+' : search.results.length"
            ></span>
        </button>
        <button 
            class="mobile-bottom-tab relative"
            :class="{'active': ui.activePanel === 'tags' && ui.mobileSidebarOpen}"
            @click="ui.activePanel = 'tags'; ui.mobileSidebarOpen = true;"
            :aria-label="t('tags.title')"
        >
            <svg fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            </svg>
            <span x-text="t('tags.title')"></span>
            <!-- Filtered notes badge (shows result count when tags selected) -->
            <span 
                x-show="tags.selected.length > 0"
                x-cloak
                class="absolute top-1 right-1/4 w-4 h-4 text-[9px] font-bold rounded-full flex items-center justify-center"
                style="background-color: var(--accent-primary); color: white;"
                x-text="search.results.length > 9 ? '9+' : search.results.length"
            ></span>
        </button>
        <button 
            class="mobile-bottom-tab"
            :class="{'active': graph.show}"
            @click="graph.show = true; initGraph(); ui.mobileSidebarOpen = false;"
            :aria-label="t('graph.title')"
        >
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
            </svg>
            <span x-text="t('graph.title')"></span>
        </button>
        <button 
            class="mobile-bottom-tab"
            :class="{'active': ui.activePanel === 'settings' && ui.mobileSidebarOpen}"
            @click="ui.activePanel = 'settings'; ui.mobileSidebarOpen = true;"
            :aria-label="t('sidebar.settings')"
        >
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span x-text="t('sidebar.settings')"></span>
        </button>
    </nav>
