                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                        </svg>
                        <span x-text="t('outline.title')"></span>
                    </button>
                    
                    <!-- Toolbar -->
                    <div class="px-4 py-3 flex items-center justify-between mobile-toolbar zen-hide" style="background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-primary);">
                        <div class="flex items-center space-x-2">
                            <!-- Mobile Menu Button -->
                            <button 
                                @click="ui.mobileSidebarOpen = !ui.mobileSidebarOpen"
                                class="mobile-menu-button p-2 rounded-lg"
                                style="color: var(--text-primary); display: none;"
                                onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                                onmouseout="this.style.backgroundColor='transparent'"
                                :title="t('sidebar.toggle_sidebar')"
                            >
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                            <input
                                type="text"
                                :value="note.current ? note.name : (media.current ? media.current.split('/').pop() : '')"
                                @input="if (note.current) note.name = $event.target.value"
                                @blur="if (note.current) renameNote()"
                                :readonly="!note.current"
                                class="text-xl font-semibold border-none focus:outline-none focus:ring-2 rounded px-3 py-1.5"
                                :style="'background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-primary); min-width: 150px; max-width: 300px;' + (!note.current ? ' cursor: default; opacity: 0.9;' : '') + (note.current && ui.activePanel !== 'outline' && note.outline.length > 0 ? ' margin-left: 40px;' : '')"
                            >
                            <!-- Undo Button -->
                            <button 
                                @click="undo()"
                                :disabled="history.undo.length <= 1"
                                class="p-2 rounded-lg"
                                :style="history.undo.length <= 1 ? 'color: var(--text-tertiary); opacity: 0.4; cursor: not-allowed;' : 'color: var(--text-secondary);'"
                                onmouseover="if(!this.disabled) this.style.backgroundColor='var(--bg-hover)'"
                                onmouseout="this.style.backgroundColor='transparent'"
                                :title="t('toolbar.undo')"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                                </svg>
                            </button>
                            
                            <!-- Redo Button -->
                            <button 
                                @click="redo()"
                                :disabled="history.redo.length === 0"
                                class="p-2 rounded-lg"
                                :style="history.redo.length === 0 ? 'color: var(--text-tertiary); opacity: 0.4; cursor: not-allowed;' : 'color: var(--text-secondary);'"
                                onmouseover="if(!this.disabled) this.style.backgroundColor='var(--bg-hover)'"
                                onmouseout="this.style.backgroundColor='transparent'"
                                :title="t('toolbar.redo')"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2m18-10l-6 6m6-6l-6-6"></path>
                                </svg>
                            </button>
                            
                            <!-- Delete Button -->
                            <button 
                                @click="media.current ? deleteMedia(media.current) : deleteCurrentNote()"
                                class="p-2 rounded-lg"
                                style="color: var(--error);"
                                onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                                onmouseout="this.style.backgroundColor='transparent'"
                                :title="media.current ? t('toolbar.delete_image') : t('toolbar.delete_note')"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                            <span x-show="note.isSaving" class="text-xs" style="color: var(--text-secondary);" x-text="t('common.saving')"></span>
                            <span x-show="!note.isSaving && note.lastSaved" class="text-xs" style="color: var(--success);" x-text="t('common.saved')"></span>
                            <span x-show="!note.isSaving && !note.lastSaved && lastEditedText" class="text-xs hidden md:inline" style="color: var(--text-tertiary);" x-text="t('editor.edited', {time: lastEditedText})"></span>
                        </div>
                        
                        <!-- Demo Mode Warning Banner -->
                        <div x-show="app.demoMode" class="flex items-center px-3 py-1.5 text-xs rounded-lg" style="background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%); color: white; font-weight: 500;">
                            <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                            <span><strong x-text="t('demo.title') + ':'"></strong> <span x-text="t('demo.warning')"></span></span>
                        </div>
                        
                        <div class="flex items-center space-x-2" x-show="note.current">
                            <!-- View Toggle (only for notes) -->
                            <div class="flex rounded-lg p-1" style="background-color: var(--bg-tertiary);">
                                <button 
                                    @click="ui.viewMode = 'edit'"
                                    class="px-2 md:px-3 py-1 text-xs md:text-sm rounded transition"
                                    :style="ui.viewMode === 'edit' ? 'background-color: var(--accent-primary); color: white;' : 'color: var(--text-secondary);'"
                                    @mouseenter="if (ui.viewMode !== 'edit') $el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="if (ui.viewMode !== 'edit') $el.style.backgroundColor = 'transparent'"
                                    x-text="t('editor.mode_edit')"
                                >
                                </button>
                                <button 
                                    @click="ui.viewMode = 'split'"
                                    class="mobile-hide-split px-2 md:px-3 py-1 text-xs md:text-sm rounded transition"
                                    :style="ui.viewMode === 'split' ? 'background-color: var(--accent-primary); color: white;' : 'color: var(--text-secondary);'"
                                    @mouseenter="if (ui.viewMode !== 'split') $el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="if (ui.viewMode !== 'split') $el.style.backgroundColor = 'transparent'"
                                    x-text="t('editor.mode_split')"
                                >
                                </button>
                                <button 
                                    @click="ui.viewMode = 'preview'"
                                    class="px-2 md:px-3 py-1 text-xs md:text-sm rounded transition"
                                    :style="ui.viewMode === 'preview' ? 'background-color: var(--accent-primary); color: white;' : 'color: var(--text-secondary);'"
                                    @mouseenter="if (ui.viewMode !== 'preview') $el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="if (ui.viewMode !== 'preview') $el.style.backgroundColor = 'transparent'"
                                    x-text="t('editor.mode_preview')"
                                >
                                </button>
                            </div>
                            
                            <!-- Note Actions Toolbar -->
                            <div 
                                x-show="note.current"
                                class="flex items-center rounded overflow-hidden"
                                style="background-color: var(--bg-tertiary); border: 1px solid var(--border-primary);"
                            >
                                <button 
                                    @click="toggleFavorite()"
                                    class="p-2 transition"
                                    :title="isFavorite(note.current) ? t('toolbar.remove_favorite') : t('toolbar.add_favorite')"
                                    :style="'color: ' + (isFavorite(note.current) ? 'var(--warning, #eab308)' : 'var(--text-secondary)') + ';'"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <!-- Filled star (favorited) -->
                                    <svg x-show="isFavorite(note.current)" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                    </svg>
                                    <!-- Empty star (not favorited) -->
                                    <svg x-show="!isFavorite(note.current)" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                                    </svg>
                                </button>
                                <div style="width: 1px; height: 20px; background-color: var(--border-primary);"></div>
                                <button 
                                    @click="exportToHTML()"
                                    class="p-2 transition"
                                    style="color: var(--text-secondary);"
                                    :title="t('toolbar.export_html')"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                    </svg>
                                </button>
                                <div style="width: 1px; height: 20px; background-color: var(--border-primary);"></div>
                                <button 
                                    @click="copyNoteLink()"
                                    class="p-2 transition hover:bg-opacity-80"
                                    :title="ui.linkCopied ? t('common.copied') : t('toolbar.copy_link')"
                                    :style="'color: ' + (ui.linkCopied ? 'var(--success, #22c55e)' : 'var(--text-secondary)') + ';'"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <!-- Link icon (default) -->
                                    <svg x-show="!ui.linkCopied" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                                    </svg>
                                    <!-- Checkmark icon (after copy) -->
                                    <svg x-show="ui.linkCopied" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </button>
                                <div style="width: 1px; height: 20px; background-color: var(--border-primary);"></div>
                                <!-- Share button -->
                                <button 
                                    @click="openShareModal()"
                                    class="p-2 transition hover:bg-opacity-80"
                                    :title="t('share.button_tooltip')"
                                    style="color: var(--text-secondary);"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <!-- Share/Globe icon -->
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                                    </svg>
                                </button>
                                <div style="width: 1px; height: 20px; background-color: var(--border-primary);"></div>
                                <!-- Cleanup Orphaned Media button -->
                                <button 
                                    @click="openOrphanedMediaModal()"
                                    class="p-2 transition hover:bg-opacity-80"
                                    :title="t('toolbar.cleanup_orphaned_media')"
                                    style="color: var(--text-secondary);"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <!-- Trash icon -->
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                                <div style="width: 1px; height: 20px; background-color: var(--border-primary);"></div>
                                <button 
                                    @click="toggleZenMode()"
                                    class="p-2 transition"
                                    style="color: var(--text-secondary);"
                                    :title="t('zen_mode.tooltip')"
                                    @mouseenter="$el.style.backgroundColor = 'var(--bg-secondary)'"
                                    @mouseleave="$el.style.backgroundColor = 'transparent'"
                                >
                                    <!-- Expand/Focus icon -->
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Editor/Preview/Graph -->
                    <div class="flex-1 flex relative" style="min-height: 0;">
                        <!-- Editor -->
                        <div 
                            x-show="!media.current && (ui.viewMode === 'edit' || ui.viewMode === 'split')"
                            class="flex flex-col"
                            style="min-height: 0;"
                            :style="ui.viewMode === 'split' ? `width: ${ui.editorWidth}%;` : 'width: 100%;'"
                        >
                            <!-- Markdown Formatting Toolbar -->
                            <div class="flex items-center gap-1 px-2 py-1.5 border-b flex-shrink-0" style="background-color: var(--bg-secondary); border-color: var(--border-primary);">
                                <button @click="formatText('bold')" class="format-btn" :title="t('format.bold') + ' (Ctrl+B)'">
                                    <span class="font-bold">B</span>
                                </button>
                                <button @click="formatText('italic')" class="format-btn" :title="t('format.italic') + ' (Ctrl+I)'">
                                    <span class="italic">I</span>
                                </button>
                                <button @click="formatText('strikethrough')" class="format-btn" :title="t('format.strikethrough')">
                                    <span class="line-through">S</span>
                                </button>
                                <div class="w-px h-4 mx-1" style="background-color: var(--border-primary);"></div>
                                <button @click="formatText('heading')" class="format-btn" :title="t('format.heading')">
                                    <span class="font-bold text-xs">H</span>
                                </button>
                                <button @click="formatText('link')" class="format-btn" :title="t('format.link') + ' (Ctrl+K)'">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                </button>
                                <button @click="formatText('image')" class="format-btn" :title="t('format.image')">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                </button>
                                <div class="w-px h-4 mx-1" style="background-color: var(--border-primary);"></div>
                                <button @click="formatText('code')" class="format-btn" :title="t('format.code')">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                                </button>
                                <button @click="formatText('codeblock')" class="format-btn" :title="t('format.codeblock')">
                                    <span class="text-xs font-mono">{}</span>
                                </button>
                                <button @click="formatText('quote')" class="format-btn" :title="t('format.quote')">
                                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
                                </button>
                                <div class="w-px h-4 mx-1" style="background-color: var(--border-primary);"></div>
                                <button @click="formatText('bullet')" class="format-btn" :title="t('format.bullet_list')">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                                </button>
                                <button @click="formatText('numbered')" class="format-btn" :title="t('format.numbered_list')">
                                    <span class="text-xs font-mono">1.</span>
                                </button>
                                <button @click="formatText('checkbox')" class="format-btn" :title="t('format.checkbox')">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </button>
                                <button @click="formatText('table')" class="format-btn" :title="t('format.table') + ' (Ctrl+Alt+T)'">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                </button>
                                <!-- Search match navigation (shown when there are matches in editor) -->
                                <template x-if="search.editorMatchCount > 0">
                                    <div class="flex items-center gap-1 ml-auto">
                                        <div class="w-px h-4 mx-1" style="background-color: var(--border-primary);"></div>
                                        <button 
                                            @click="previousEditorMatch()"
                                            class="format-btn"
                                            :title="t('search.previous_match') + ' (Shift+F3)'"
                                        >
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                        </button>
                                        <span 
                                            class="text-xs px-2"
                                            style="color: var(--text-secondary);"
                                            x-text="(search.currentEditorMatchIndex + 1) + ' / ' + search.editorMatchCount"
                                        ></span>
                                        <button 
                                            @click="nextEditorMatch()"
                                            class="format-btn"
                                            :title="t('search.next_match') + ' (F3)'"
                                        >
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </button>
                                    </div>
                                </template>
                            </div>
                            <div 
                                class="editor-wrapper"
                                :class="{'syntax-highlight': ui.syntaxHighlightEnabled}"
                            >
                                <div 
                                    id="syntax-overlay"
                                    class="syntax-overlay"
                                    x-show="ui.syntaxHighlightEnabled"
                                    x-html="ui.syntaxHighlightEnabled ? highlightMarkdown(note.content) : ''"
                                ></div>
                                <textarea 
                                    id="note-editor"
                                    x-model="note.content"
                                    @input="autoSave(); updateSyntaxHighlight()"
                                    @scroll="syncOverlayScroll()"
                                    @drop="onEditorDrop($event)"
                                    @dragover.prevent="onEditorDragOver($event)"
                                    @dragenter="onEditorDragEnter($event)"
                                    @dragleave="onEditorDragLeave($event)"
                                    @paste="handlePaste($event)"
                                    :class="'flex-1 w-full resize-none focus:outline-none editor-textarea' + (drag.item && drag.target === 'editor' ? ' link-drop-target' : '')"
                                    :style="'background-color: var(--bg-primary); color: var(--text-primary);' + (drag.item && drag.target === 'editor' ? ' outline: 2px dashed var(--accent-primary); outline-offset: -2px; box-shadow: 0 0 20px var(--accent-light);' : '')"
                                    :placeholder="drag.item && drag.target === 'editor' ? t('editor.drop_hint') : t('editor.placeholder')"
                                ></textarea>
                            </div>
                        </div>
                        
                        <!-- Split view resize handle -->
                        <div 
                            x-show="!media.current && ui.viewMode === 'split'"
                            @mousedown="startSplitResize($event)"
                            class="split-resize-handle"
                            style="width: 6px; cursor: col-resize; background: linear-gradient(90deg, transparent 0%, var(--border-secondary) 50%, transparent 100%); transition: all 0.2s; position: relative; z-index: 10; opacity: 0.5;"
                            @mouseover="$el.style.opacity='1'; $el.style.background='var(--accent-primary)'"
                            @mouseout="if(!ui.isResizingSplit) { $el.style.opacity='0.5'; $el.style.background='linear-gradient(90deg, transparent 0%, var(--border-secondary) 50%, transparent 100%)' }"
                        ></div>
                        
                        <!-- Preview -->
                        <div 
                            x-show="(ui.viewMode === 'preview' || ui.viewMode === 'split') && !media.current"
                            class="overflow-y-auto overflow-x-hidden custom-scrollbar"
                            style="background-color: var(--bg-primary); min-height: 0;"
                            :style="ui.viewMode === 'split' ? `width: ${100 - ui.editorWidth}%;` : 'width: 100%;'"
                        >
                            <!-- Note Properties/Metadata Panel -->
                            <div 
                                x-show="getHasMetadata() && note.current"
                                class="note-properties mx-6 mt-4 mb-2"
                            >
                                <!-- Collapsed View -->
                                <div 
                                    x-show="!stats.expanded"
                                    @click="stats.expanded = true"
                                    class="flex flex-wrap items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition-all"
                                    style="background-color: var(--bg-tertiary); border: 1px solid var(--border-primary);"
                                    onmouseover="this.style.borderColor='var(--accent-primary)'"
                                    onmouseout="this.style.borderColor='var(--border-primary)'"
                                >
                                    <!-- Property icon -->
                                    <span class="text-xs opacity-60">⚙️</span>
                                    
                                    <!-- Tags as pills -->
                                    <template x-for="tag in getMetadataTags().slice(0, 5)" :key="tag">
                                        <span 
                                            @click.stop="toggleTag(tag.toLowerCase())"
                                            class="metadata-tag px-2 py-0.5 text-xs rounded-full cursor-pointer transition-colors"
                                            style="background-color: var(--accent-light, rgba(124, 58, 237, 0.15)); color: var(--accent-primary);"
                                            onmouseover="this.style.backgroundColor='var(--accent-primary)'; this.style.color='white'"
                                            onmouseout="this.style.backgroundColor='var(--accent-light, rgba(124, 58, 237, 0.15))'; this.style.color='var(--accent-primary)'"
                                            x-text="'#' + tag"
                                        ></span>
                                    </template>
                                    <template x-if="getMetadataTags().length > 5">
                                        <span class="text-xs" style="color: var(--text-tertiary);">+<span x-text="getMetadataTags().length - 5"></span> more</span>
                                    </template>
                                    
                                    <!-- Priority fields (date, author, status) -->
                                    <template x-for="field in getPriorityMetadataFields()" :key="field.key">
                                        <span class="text-xs flex items-center gap-1" style="color: var(--text-secondary);">
                                            <span class="opacity-50">·</span>
                                            <span class="capitalize" x-text="field.key + ':'"></span>
                                            <span style="color: var(--text-primary);" x-html="field.valueHtml" @click="field.isUrl && $event.stopPropagation()"></span>
                                        </span>
                                    </template>
                                    
                                    <!-- Expand hint -->
                                    <span class="ml-auto text-xs opacity-40">▼</span>
                                </div>
                                
                                <!-- Expanded View -->
                                <div 
                                    x-show="stats.expanded"
                                    class="rounded-lg overflow-hidden"
                                    style="background-color: var(--bg-tertiary); border: 1px solid var(--border-primary);"
                                >
                                    <!-- Header -->
                                    <div 
                                        @click="stats.expanded = false"
                                        class="flex items-center justify-between px-3 py-2 cursor-pointer"
                                        style="border-bottom: 1px solid var(--border-primary);"
                                    >
                                        <span class="text-xs font-medium" style="color: var(--text-secondary);">
                                            ⚙️ Properties
                                        </span>
                                        <span class="text-xs opacity-40">▲ Collapse</span>
                                    </div>
                                    
                                    <!-- Properties Grid -->
                                    <div class="px-3 py-2 space-y-2">
                                        <!-- Tags row -->
                                        <template x-if="getMetadataTags().length > 0">
                                            <div class="flex flex-wrap gap-1.5 items-start">
                                                <span class="text-xs w-16 shrink-0 pt-0.5" style="color: var(--text-tertiary);">tags</span>
                                                <div class="flex flex-wrap gap-1">
                                                    <template x-for="tag in getMetadataTags()" :key="tag">
                                                        <span 
                                                            @click="toggleTag(tag.toLowerCase())"
                                                            class="metadata-tag px-2 py-0.5 text-xs rounded-full cursor-pointer transition-colors"
                                                            style="background-color: var(--accent-light, rgba(124, 58, 237, 0.15)); color: var(--accent-primary);"
                                                            onmouseover="this.style.backgroundColor='var(--accent-primary)'; this.style.color='white'"
                                                            onmouseout="this.style.backgroundColor='var(--accent-light, rgba(124, 58, 237, 0.15))'; this.style.color='var(--accent-primary)'"
                                                            x-text="'#' + tag"
                                                        ></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                        
                                        <!-- Other fields -->
                                        <template x-for="field in getAllMetadataFields()" :key="field.key">
                                            <div class="flex gap-1.5 items-start text-xs">
                                                <span class="w-16 shrink-0 pt-0.5" style="color: var(--text-tertiary);" x-text="field.key"></span>
                                                <!-- Array values -->
                                                <template x-if="field.isArray">
                                                    <div class="flex flex-wrap gap-1">
                                                        <template x-for="item in field.value" :key="item">
                                                            <span 
                                                                class="px-1.5 py-0.5 rounded text-xs"
                                                                style="background-color: var(--bg-hover); color: var(--text-primary);"
                                                                x-text="item"
                                                            ></span>
                                                        </template>
                                                    </div>
                                                </template>
                                                <!-- Single values -->
                                                <template x-if="!field.isArray">
                                                    <span style="color: var(--text-primary);" x-html="field.valueHtml"></span>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                            
                            <div 
                                class="p-6 markdown-preview"
                                :class="{ 'pt-2': getHasMetadata() && note.current, 'readable-width': ui.readableLineLength }"
                                x-html="renderedMarkdown"
                                @click="handleInternalLink($event)"
                            ></div>
                        </div>
                        
                        <!-- Media Viewer (images, audio, video, PDF) -->
                        <template x-if="media.current">
                            <div 
                                class="flex-1 flex items-center justify-center overflow-auto"
                                style="background-color: var(--bg-primary); min-height: 0;"
                            >
                                <!-- Image -->
                                <template x-if="media.type === 'image'">
                                    <img 
                                        :src="`/api/media/${media.current}`" 
                                        :alt="media.current.split('/').pop()"
                                        style="max-width: 100%; max-height: 100%; object-fit: contain; padding: 2rem;"
                                    />
                                </template>
                                
                                <!-- Audio -->
                                <template x-if="media.type === 'audio'">
                                    <div class="flex flex-col items-center gap-4 p-8">
                                        <div class="text-6xl">🎵</div>
                                        <div class="text-lg font-medium" style="color: var(--text-primary);" x-text="media.current.split('/').pop()"></div>
                                        <audio 
                                            controls 
                                            :src="`/api/media/${media.current}`"
                                            style="width: 100%; max-width: 500px;"
                                        >
                                            Your browser does not support the audio element.
                                        </audio>
                                    </div>
                                </template>
                                
                                <!-- Video -->
                                <template x-if="media.type === 'video'">
                                    <video 
                                        controls 
                                        :src="`/api/media/${media.current}`"
                                        style="max-width: 100%; max-height: 100%; padding: 1rem;"
                                    >
                                        Your browser does not support the video element.
                                    </video>
                                </template>
                                
                                <!-- PDF -->
                                <template x-if="media.type === 'document'">
                                    <iframe 
                                        :src="`/api/media/${media.current}`"
                                        style="width: 100%; height: 100%; border: none;"
                                        :title="media.current.split('/').pop()"
                                    ></iframe>
                                </template>
                            </div>
                        </template>
                    </div>
                    
                    <!-- Stats Status Bar (only shows if stats enabled) -->
                    <div x-show="stats.enabled && note.current && stats.data" 
                         class="border-t zen-hide"
                         style="background-color: var(--bg-secondary); border-color: var(--border-primary);">
                        
                        <!-- Collapsed State (default) -->
                        <div x-show="!stats.expanded" 
                             @click="stats.expanded = true"
                             class="px-4 py-2 flex items-center justify-between cursor-pointer hover:bg-opacity-80 transition-colors"
                             onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                             onmouseout="this.style.backgroundColor='transparent'">
                            <div class="flex items-center space-x-4 text-sm" style="color: var(--text-secondary);">
                                <span class="font-medium">📊</span>
                                <span x-text="stats.data ? stats.data.words.toLocaleString() + ' words' : ''"></span>
                                <span>·</span>
                                <span x-text="stats.data ? '~' + stats.data.reading_time_minutes + 'm read' : ''"></span>
                                <template x-if="stats.data && stats.data.links > 0">
                                    <span>
                                        · <span x-text="stats.data.links + ' links'"></span>
                                    </span>
                                </template>
                                <template x-if="stats.data && stats.data.tasks.total > 0">
                                    <span>
                                        · <span x-text="stats.data.tasks.completed + '/' + stats.data.tasks.total + ' tasks'"></span>
                                    </span>
                                </template>
                            </div>
                            <span class="text-xs" style="color: var(--text-tertiary);">▼ Click for details</span>
                        </div>
                        
                        <!-- Expanded State -->
                        <div x-show="stats.expanded" 
                             class="px-4 py-3"
                             style="background-color: var(--bg-tertiary);">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="font-semibold text-sm" style="color: var(--text-primary);">📊 Note Statistics</h3>
                                <button 
                                    @click="stats.expanded = false"
                                    class="text-xs px-2 py-1 rounded hover:bg-opacity-80"
                                    style="color: var(--text-secondary); background-color: var(--bg-hover);">
                                    ▲ Collapse
                                </button>
                            </div>
                            
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                                <!-- Basic Stats -->
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.words')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.words.toLocaleString() : '0'"></div>
                                </div>
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.characters')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.characters.toLocaleString() : '0'"></div>
                                </div>
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.reading_time_label')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? '~' + stats.data.reading_time_minutes + ' min' : '0 min'"></div>
                                </div>
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.lines')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.lines.toLocaleString() : '0'"></div>
                                </div>
                                
                                <!-- Sentences -->
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.sentences')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.sentences.toLocaleString() : '0'"></div>
                                </div>

                                <!-- Lists -->
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.lists')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.list_items.toLocaleString() : '0'"></div>
                                </div>

                                <!-- Tables -->
                                <div>
                                    <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.tables')"></div>
                                    <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data ? stats.data.tables.toLocaleString() : '0'"></div>
                                </div>
                                
                                <!-- Links -->
                                <template x-if="stats.data && stats.data.links > 0">
                                    <div>
                                        <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.links_label')"></div>
                                        <div class="font-semibold" style="color: var(--text-primary);">
                                            <span x-text="stats.data.links"></span>
                                            <span class="text-xs font-normal" style="color: var(--text-tertiary);">
                                                (<span x-text="stats.data.internal_links"></span> <span x-text="t('stats.internal')"></span>)
                                            </span>
                                        </div>
                                    </div>
                                </template>
                                
                                <!-- Headings -->
                                <template x-if="stats.data && stats.data.headings.total > 0">
                                    <div>
                                        <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.headings')"></div>
                                        <div class="font-semibold" style="color: var(--text-primary);">
                                            <span x-text="stats.data.headings.total"></span>
                                            <span class="text-xs font-normal" style="color: var(--text-tertiary);">
                                                (H1: <span x-text="stats.data.headings.h1"></span>, H2: <span x-text="stats.data.headings.h2"></span>)
                                            </span>
                                        </div>
                                    </div>
                                </template>
                                
                                <!-- Code Blocks -->
                                <template x-if="stats.data && stats.data.code_blocks > 0">
                                    <div>
                                        <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.code_blocks')"></div>
                                        <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data.code_blocks"></div>
                                    </div>
                                </template>
                                
                                <!-- Tasks -->
                                <template x-if="stats.data && stats.data.tasks.total > 0">
                                    <div>
                                        <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.tasks')"></div>
                                        <div class="font-semibold" style="color: var(--text-primary);">
                                            <span x-text="stats.data.tasks.completed + '/' + stats.data.tasks.total"></span>
                                            <span class="text-xs font-normal" style="color: var(--text-tertiary);">
                                                (<span x-text="stats.data.tasks.completion_rate"></span>%)
                                            </span>
                                        </div>
                                    </div>
                                </template>
                                
                                <!-- Images -->
                                <template x-if="stats.data && stats.data.images > 0">
                                    <div>
                                        <div class="text-xs" style="color: var(--text-tertiary);" x-text="t('stats.images')"></div>
                                        <div class="font-semibold" style="color: var(--text-primary);" x-text="stats.data.images"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <div x-show="note.current && media.attachments.length > 0" 
                         class="border-t zen-hide"
                         style="background-color: var(--bg-secondary); border-color: var(--border-primary);">
                        
                        <div x-show="!media.attachmentsExpanded" 
                             @click="media.attachmentsExpanded = true"
                             class="px-4 py-2 flex items-center justify-between cursor-pointer hover:bg-opacity-80 transition-colors"
                             onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                             onmouseout="this.style.backgroundColor='transparent'">
                            <div class="flex items-center space-x-4 text-sm" style="color: var(--text-secondary);">
                                <span class="font-medium">📎</span>
                                <span x-text="media.attachments.length + ' ' + (media.attachments.length === 1 ? t('media.attachment') : t('media.attachments'))"></span>
                            </div>
                            <span class="text-xs" style="color: var(--text-tertiary);" x-text="t('media.click_to_view')"></span>
                        </div>
                        
                        <div x-show="media.attachmentsExpanded" 
                             class="px-4 py-3"
                             style="background-color: var(--bg-tertiary);">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="font-semibold text-sm" style="color: var(--text-primary);">📎 Attachments</h3>
                                <button 
                                    @click="media.attachmentsExpanded = false"
                                    class="text-xs px-2 py-1 rounded hover:bg-opacity-80"
                                    style="color: var(--text-secondary); background-color: var(--bg-hover);">
                                    ▲ Collapse
                                </button>
                            </div>
                            
                            <div class="space-y-2">
                                <template x-for="attachment in media.attachments" :key="attachment.path">
                                    <div class="flex items-center justify-between p-2 rounded" style="background-color: var(--bg-secondary);">
                                        <div class="flex items-center gap-2 min-w-0 flex-1">
                                            <svg x-show="attachment.type === 'image'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                            </svg>
                                            <svg x-show="attachment.type === 'video'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                            </svg>
                                            <svg x-show="attachment.type === 'audio'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                                            </svg>
                                            <svg x-show="attachment.type === 'document'" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                            </svg>
                                            <svg x-show="!attachment.type || (attachment.type !== 'image' && attachment.type !== 'video' && attachment.type !== 'audio' && attachment.type !== 'document')" class="w-4 h-4 flex-shrink-0" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                            <span class="text-sm truncate" style="color: var(--text-primary);" x-text="attachment.name" :title="attachment.path"></span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs" style="color: var(--text-tertiary);" x-text="formatBytes(attachment.size)"></span>
                                            <a :href="'/api/media/' + attachment.path" 
                                               :download="attachment.name"
                                               class="text-xs px-2 py-1 rounded hover:bg-opacity-80"
                                               style="color: var(--accent-primary); background-color: var(--bg-hover);"
                                               @click.stop>
                                                Download
                                            </a>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </template>
            
        </div>
    </div>
    
    <!-- Contextual New Item Dropdown -->
    <div 
        x-show="modals.newDropdown.show"
        @click.outside="closeDropdown()"
        x-transition:enter="transition ease-out duration-100"
        x-transition:enter-start="transform opacity-0 scale-95"
        x-transition:enter-end="transform opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="transform opacity-100 scale-100"
        x-transition:leave-end="transform opacity-0 scale-95"
        class="rounded-lg shadow-lg"
        :style="`position: fixed; top: ${modals.newDropdown.position.top}px; left: ${modals.newDropdown.position.left}px; z-index: 1000; background-color: var(--bg-secondary); border: 1px solid var(--border-primary); min-width: 200px;`"
        x-cloak
    >
        <div class="py-1">
            <button 
                @click="createNote()"
                class="w-full px-4 py-2.5 text-sm text-left flex items-center gap-3 transition-colors"
                style="color: var(--text-primary);"
                onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                onmouseout="this.style.backgroundColor='transparent'"
            >
                <span class="text-lg">📝</span>
                <span x-text="t('sidebar.new_note')"></span>
            </button>
            <button 
                @click="createFolder()"
                class="w-full px-4 py-2.5 text-sm text-left flex items-center gap-3 transition-colors"
                style="color: var(--text-primary);"
                onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                onmouseout="this.style.backgroundColor='transparent'"
            >
                <span class="text-lg">📁</span>
                <span x-text="t('sidebar.new_folder')"></span>
            </button>
            <button 
                @click.stop="modals.template.show = true; modals.newDropdown.show = false; ui.mobileSidebarOpen = false"
                class="w-full px-4 py-2.5 text-sm text-left flex items-center gap-3 transition-colors"
                style="color: var(--text-primary);"
                onmouseover="this.style.backgroundColor='var(--bg-hover)'"
                onmouseout="this.style.backgroundColor='transparent'"
            >
                <span class="text-lg">📄</span>
                <span x-text="t('sidebar.new_from_template')"></span>
            </button>
        </div>
    </div>
    
    <!-- Template Selection Modal -->
    <div x-show="modals.template.show" 
         @click.self="modals.template.show = false; modals.template.selected = ''; modals.template.newNoteName = ''"
         @keydown.escape.window="modals.template.show && (modals.template.show = false, modals.template.selected = '', modals.template.newNoteName = '')"
         class="fixed inset-0 flex items-center justify-center"
         style="background-color: rgba(0, 0, 0, 0.5); z-index: 1100;"
         x-cloak>
        <div class="rounded-lg shadow-xl p-6 max-w-md w-full mx-4"
             style="background-color: var(--bg-secondary); color: var(--text-primary);"
             @click.stop>
