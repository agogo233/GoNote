# GoNote Configuration - Updated for new directory structure
# GoNote 配置文件 - 已更新为新的目录结构
# See project-docs/developer-guide/ENVIRONMENT_VARIABLES.md for environment variable overrides
# 详见 project-docs/developer-guide/ENVIRONMENT_VARIABLES.md 了解环境变量覆盖配置

app:
  name: "GoNote"
  
# ==================== 日志配置 ====================
log:
  # 是否启用日志（环境变量：LOG_ENABLED）
  # 设为 false 可关闭所有日志输出（启动日志、HTTP请求日志、错误日志等）
  enabled: true             # Enable/disable all logging (env: LOG_ENABLED)
  
# ==================== 服务器配置 ====================
server:
  # 监听地址 (环境变量: HOST)
  host: "0.0.0.0"
  
  # 监听端口 (环境变量: PORT)
  port: 9000
  
  # CORS 允许的源，多个用逗号分隔 (环境变量: ALLOWED_ORIGINS)
  # 示例: ["http://localhost:9000", "https://yourdomain.com"]
  allowed_origins: ["*"]
  
  # 是否启用调试模式 (环境变量: DEBUG)
  debug: false

# ==================== 存储配置 ====================
storage:
  # 笔记数据目录（环境变量：STORAGE_NOTES_DIR）
  # 使用相对路径，基于当前工作目录解析
  # Docker: CWD=/app => ./data/notes => /app/data/notes
  # 本地开发: CWD=项目根 => ./data/notes => [project]/data/notes
  notes_dir: "./data/notes"
  
# ==================== 搜索配置 ====================
search:
  # 是否启用搜索功能（环境变量：SEARCH_ENABLED）
  enabled: true
  
# ==================== 认证配置 ====================
authentication:
  # 是否启用认证（环境变量：AUTHENTICATION_ENABLED）
  # 设为 true 后访问需要登录
  enabled: false

  # ⚠️ 安全警告：暴露到互联网前必须修改这些值！
  # 以下默认值仅用于本地测试

  # 会话密钥 - 必须修改为随机字符串！
  # 生成命令：openssl rand -hex 32
  secret_key: "change_this_to_a_random_secret_key_in_production"

  # 密码配置 - 选择以下选项之一：
  # Option 1: 明文密码（推荐，方便使用）
  # 密码会在启动时自动哈希处理
  # ⚠️ 默认密码是 "admin" - 生产环境请修改！
  password: "admin"

  # Option 2: 预哈希密码（更安全，密码不会以明文形式出现在配置文件中）
  # 使用 bcrypt 生成哈希：htpasswd -bnBC 10 "" your_password | tr -d ':\n'
  # password_hash: ""

  # 会话有效期（秒），默认 7 天
  session_max_age: 604800

  # 安全 Cookie - 为 true 时仅在 HTTPS 连接发送 Cookie
  secure_cookie: false

# ==================== 文件上传配置 ====================
# upload:
#   # 单个文件最大大小（MB），默认 50
#   max_file_size_mb: 50
#   # 请求体最大大小（MB），默认 100
#   max_body_size_mb: 100
#   # 允许的文件 MIME 类型，空列表表示允许所有支持的类型
#   # 可选值: image/jpeg, image/png, image/gif, image/webp, audio/mpeg, audio/ogg, audio/wav, video/mp4, video/webm, application/pdf
#   allowed_types: []

# ==================== 定时任务配置 ====================
# ⚠️ 后台定时任务功能尚未实现，以下配置保留为未来计划
# To implement: add scheduler goroutines in main.go
# scheduler:
#   cleanup_interval_minutes: 1440  # 每天一次（分钟）
#   backup_interval_hours: 168      # 每周一次（小时）

# ==================== 性能配置 ====================
# 缓存配置
cache:
  # LRU 缓存配置
  ttl: 60          # 缓存过期时间（秒），默认 60 秒
  capacity: 1000   # 缓存最大条目数，默认 1000
  scan_interval: 30  # 后台扫描间隔（秒），默认 30 秒

# 限流配置
rate_limit:
  enabled: false   # 限流配置 - 防止滥用
  max_requests: 30 # 每个时间窗口最大请求数
  window_seconds: 1 # 时间窗口时长（秒）