# GoNote Configuration
# GoNote 配置文件
# See project-docs/developer-guide/ENVIRONMENT_VARIABLES.md for environment variable overrides
# 详见 project-docs/developer-guide/ENVIRONMENT_VARIABLES.md 了解环境变量覆盖配置

app:
  name: "GoNote"
  
# ==================== 日志配置 ====================
log:
  # 是否启用日志（环境变量：LOG_ENABLED）
  # 设为 false 可关闭所有日志输出（启动日志、HTTP请求日志、错误日志等）
  enabled: true             # Enable/disable all logging (env: LOG_ENABLED)
  
# ==================== 服务器配置 ====================
server:
  # 服务器绑定地址（环境变量：HOST）
  # 0.0.0.0 表示监听所有网络接口，127.0.0.1 表示仅本机访问
  host: "0.0.0.0"          # Server bind address (env: HOST)
  
  # 服务端口（环境变量：PORT）
  port: 9000               # Server port (env: PORT)
  
  # 文件变化时自动重载（仅开发环境使用）
  reload: false            # Auto-reload on file changes (dev only)
  
  # CORS 跨域配置（环境变量：ALLOWED_ORIGINS，逗号分隔）
  # 自托管使用 "*" 即可，生产环境建议指定允许的域名
  # 示例：["http://localhost:8000", "https://yourdomain.com"]
  # CORS (Cross-Origin Resource Sharing) configuration
  # For self-hosted use, "*" is fine. For production, specify allowed domains.
  # Examples: ["http://localhost:8000", "https://yourdomain.com"]
  # Environment variable: ALLOWED_ORIGINS (comma-separated)
  allowed_origins: ["*"]
  
  # 调试模式 - 显示详细错误信息
  # ⚠️ 警告：生产环境请设为 false！（环境变量：DEBUG）
  # Debug mode - shows detailed error messages
  # ⚠️ WARNING: Set to false in production! (env: DEBUG)
  debug: false
  
# ==================== 存储配置 ====================
storage:
  # 笔记数据目录（环境变量：STORAGE_NOTES_DIR）
  notes_dir: "./data"
  
# ==================== 搜索配置 ====================
search:
  # 是否启用搜索功能（环境变量：SEARCH_ENABLED）
  enabled: true
  
# ==================== 认证配置 ====================
authentication:
  # 是否启用认证（环境变量：AUTHENTICATION_ENABLED）
  # 设为 true 后访问需要登录
  # Authentication settings
  # Set enabled to true to require login (env: AUTHENTICATION_ENABLED)
  enabled: false
  
  # ⚠️ 安全警告：暴露到互联网前必须修改这些值！
  # 以下默认值仅用于本地测试
  # ⚠️ SECURITY WARNING: Change these values before exposing to the internet!
  # Default values below are for LOCAL TESTING ONLY
  
  # 会话密钥 - 必须修改为随机字符串！
  # 生成命令：python3 -c "import secrets; print(secrets.token_hex(32))"
  # 环境变量：AUTHENTICATION_SECRET_KEY
  # Session secret key - CHANGE THIS TO A RANDOM STRING!
  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  # Environment variable: AUTHENTICATION_SECRET_KEY
  secret_key: "change_this_to_a_random_secret_key_in_production"
  
  # 密码配置 - 选择以下选项之一：
  # Password configuration - choose ONE of the following options:
  #
  # 选项1：明文密码（推荐，易于使用）
  # 密码会在启动时自动哈希处理
  # ⚠️ 默认密码是 "admin" - 生产环境请修改！
  # 环境变量：AUTHENTICATION_PASSWORD
  # Option 1: Plain text password (recommended for ease of use)
  # The password is hashed automatically at startup
  # ⚠️ Default password is "admin" - CHANGE THIS for production!
  # Environment variable: AUTHENTICATION_PASSWORD
  password: "admin"
  
  # 选项2：预哈希密码（高级用户）
  # 使用 python generate_password.py 生成
  # Option 2: Pre-hashed password (for advanced users)
  # Generate with: python generate_password.py
  # password_hash: "$2b$12$..."
  
  # 会话有效期（秒），默认 7 天
  # Session expiry in seconds (default: 7 days)
  session_max_age: 604800
  
  # 安全 Cookie - 为 true 时仅在 HTTPS 连接发送 Cookie
  # 环境变量：AUTHENTICATION_SECURE_COOKIE
  # Secure cookie - when true, cookies will only be sent over HTTPS connections
  # Environment variable: AUTHENTICATION_SECURE_COOKIE
  #
  # 自动检测：如果未显式设为 true，系统会自动检测 HTTPS：
  #   - HTTPS 环境变量 = true/1/on
  #   - X_FORWARDED_PROTO 环境变量 = https（反向代理场景）
  #   - allowed_origins 包含 https:// URL
  # 如果检测到 HTTPS，secure_cookie 会自动启用
  # AUTO-DETECTION: If not explicitly set to true, the system will auto-detect HTTPS:
  #   - HTTPS env var = true/1/on
  #   - X_FORWARDED_PROTO env var = https (reverse proxy scenario)
  #   - allowed_origins contains https:// URLs
  # If HTTPS is detected, secure_cookie will be automatically enabled.
  secure_cookie: false

# ==================== 缓存配置 ====================
cache:
  # LRU 缓存配置
  # LRU cache configuration
  # 缓存过期时间（秒），默认 60 秒
  # TTL in seconds (default: 60)
  ttl: 60
  # 缓存最大条目数，默认 1000
  # Maximum number of items in cache (default: 1000)
  capacity: 1000
  # 后台扫描间隔（秒），默认 30 秒
  # 扫描器定期更新缓存，API 请求只从缓存读取
  # Background scan interval in seconds (default: 30)
  # Scanner updates cache periodically, API requests only read from cache
  scan_interval: 30

# ==================== 限流配置 ====================
rate_limit:
  # 限流配置 - 防止滥用
  # 自托管默认关闭，生产环境建议启用
  # Rate limiting configuration - protects against abuse
  # Default: disabled for self-hosted, enable for production
  enabled: false             # Enable rate limiting (env: RATE_LIMIT_ENABLED)
  # 每个时间窗口最大请求数（环境变量：RATE_LIMIT_MAX）
  max_requests: 30           # Max requests per window (env: RATE_LIMIT_MAX)
  # 时间窗口时长（秒）（环境变量：RATE_LIMIT_WINDOW）
  window_seconds: 1          # Window duration in seconds (env: RATE_LIMIT_WINDOW)

# ==================== 上传配置 ====================
upload:
  # 文件上传配置 - 防止大文件导致内存耗尽
  # File upload configuration - prevents memory exhaustion from large files
  # 单文件最大大小 MB（环境变量：UPLOAD_MAX_FILE_SIZE_MB）
  max_file_size_mb: 50       # Max single file size in MB (env: UPLOAD_MAX_FILE_SIZE_MB)
  # 请求体最大大小 MB（环境变量：UPLOAD_MAX_BODY_SIZE_MB）
  max_body_size_mb: 100      # Max total request body in MB (env: UPLOAD_MAX_BODY_SIZE_MB)
  # 允许的 MIME 类型（空 = 允许所有类型）。
  # 出于安全考虑，默认仅允许常见的媒体文件类型。
  # Allowed MIME types (empty = allow all types).
  # For security, default to common media file types only.
  allowed_types:
    # Images
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
    - image/svg+xml
    - image/bmp
    - image/x-icon
    # Audio
    - audio/mpeg
    - audio/ogg
    - audio/wav
    - audio/mp4
    - audio/flac
    - audio/webm
    # Video
    - video/mp4
    - video/webm
    - video/ogg
    - video/quicktime
    # Documents
    - application/pdf
    # Archives (for embedded files)
    - application/zip
    - application/x-tar
    - application/gzip