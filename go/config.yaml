# GoNote Configuration - Updated for new directory structure
# GoNote 配置文件 - 已更新为新的目录结构
# See project-docs/developer-guide/ENVIRONMENT_VARIABLES.md for environment variable overrides
# 详见 project-docs/developer-guide/ENVIRONMENT_VARIABLES.md 了解环境变量覆盖配置

app:
  name: "GoNote"
  
# ==================== 日志配置 ====================
log:
  # 是否启用日志（环境变量：LOG_ENABLED）
  # 设为 false 可关闭所有日志输出（启动日志、HTTP请求日志、错误日志等）
  enabled: true             # Enable/disable all logging (env: LOG_ENABLED)
  
  # 日志文件目录
  log_dir: "./logs"
  
# ==================== 存储配置 ====================
storage:
  # 笔记数据目录（环境变量：STORAGE_NOTES_DIR）
  # 使用相对路径，基于当前工作目录解析
  # Docker: CWD=/app => ./data/notes => /app/data/notes
  # 本地开发: CWD=项目根 => ./data/notes => [project]/data/notes
  notes_dir: "./data/notes"
  
  # 缓存目录（基于当前工作目录）
  cache_dir: "./data/cache"
  
  # 临时文件目录（基于当前工作目录）
  temp_dir: "./data/temp"
  
  # 备份目录（基于当前工作目录）
  backup_dir: "./backups"
  
# ==================== 搜索配置 ====================
search:
  # 是否启用搜索功能（环境变量：SEARCH_ENABLED）
  enabled: true
  
  # 搜索索引缓存（基于当前工作目录）
  index_cache_dir: "./data/cache/search"
  
# ==================== 认证配置 ====================
authentication:
  # 是否启用认证（环境变量：AUTHENTICATION_ENABLED）
  # 设为 true 后访问需要登录
  enabled: false
  
  # ⚠️ 安全警告：暴露到互联网前必须修改这些值！
  # 以下默认值仅用于本地测试
  
  # 会话密钥 - 必须修改为随机字符串！
  # 生成命令：python3 -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "change_this_to_a_random_secret_key_in_production"
  
  # 密码配置 - 选择以下选项之一：
  # Option 1: Plain text password (recommended for ease of use)
  # 密码会在启动时自动哈希处理
  # ⚠️ 默认密码是 "admin" - 生产环境请修改！
  password: "admin"
  
  # 会话有效期（秒），默认 7 天
  session_max_age: 604800
  
  # 安全 Cookie - 为 true 时仅在 HTTPS 连接发送 Cookie
  secure_cookie: false

# ==================== 定时任务配置 ====================
scheduler:
  # 清理任务间隔（分钟）
  cleanup_interval_minutes: 1440  # 每天一次
  
  # 备份任务间隔（小时）
  backup_interval_hours: 168  # 每周一次

# ==================== 性能配置 ====================
performance:
  # 缓存配置
  cache:
    # LRU 缓存配置
    ttl: 60          # 缓存过期时间（秒），默认 60 秒
    capacity: 1000   # 缓存最大条目数，默认 1000
    scan_interval: 30  # 后台扫描间隔（秒），默认 30 秒
  
  # 限流配置
  rate_limit:
    enabled: false   # 限流配置 - 防止滥用
    max_requests: 30 # 每个时间窗口最大请求数
    window_seconds: 1 # 时间窗口时长（秒）