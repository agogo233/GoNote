name: E2E Tests

on:
  push:
    branches: [ Go, main, master ]
  pull_request:
    branches: [ Go, main, master ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # GitHub Actions free tier has 15-minute limit per job
    # Set to 14 minutes to leave buffer for cleanup
    timeout-minutes: 14

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        cache-dependency-path: go/go.sum

    - name: Install Go dependencies
      run: cd go && go mod download

    - name: Install Playwright
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Build Go server
      run: |
        cd go
        go build -o server ./cmd/server

    - name: Create data directory
      run: mkdir -p go/data

    - name: Start server
      run: |
        cd go
        export PORT=9000
        export AUTHENTICATION_ENABLED=true
        export AUTHENTICATION_PASSWORD=test-admin-password
        ./server > server.log 2>&1 &
        SERVER_PID=$!
        echo "Server PID: $SERVER_PID"

        # Wait for server to be ready with health check
        for i in {1..30}; do
          if curl -sf http://localhost:9000/health > /dev/null; then
            echo "✅ Server ready after $i seconds"
            break
          fi
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ Server process died unexpectedly"
            cat server.log
            exit 1
          fi
          sleep 1
        done

        # Final health check
        if ! curl -sf http://localhost:9000/health > /dev/null; then
          echo "❌ Server failed to start within 30 seconds"
          cat server.log
          exit 1
        fi

    - name: Run Playwright tests
      run: npx playwright test --config=tests/playwright.config.ts
      env:
        CI: 'true'
        # Optimize playwright performance
        PLAYWRIGHT_CHROMIUM_CHANNEL: chrome

    - name: Upload failed test screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-failed-tests
        path: |
          tests/test-results/**/*.png
          tests/test-results/**/error.txt
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload server logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: server-logs
        path: go/server.log
        retention-days: 7
