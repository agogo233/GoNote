name: Manual E2E Test Runner

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        type: choice
        options:
          - core
          - auth
          - notes
          - search
          - tags
          - folders
          - export
          - media
          - mobile
          - themes
          - security
          - bugs
          - all
        default: 'core'
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - local
          - production
        default: 'local'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AUTHENTICATION_ENABLED: true
      AUTHENTICATION_PASSWORD: test-admin-password

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start server
        run: |
          make run &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:9000 > /dev/null; do sleep 1; done' || echo "Server may not be ready"

      - name: Run E2E Tests
        run: |
          case "${{ github.event.inputs.test_type }}" in
            core)     npx playwright test auth/ notes/crud.spec.ts search/search.spec.ts ;;
            auth)     npx playwright test auth/ ;;
            notes)    npx playwright test notes/ ;;
            search)   npx playwright test search/ ;;
            tags)     npx playwright test tags/ ;;
            folders)  npx playwright test folders/ ;;
            export)   npx playwright test export/ ;;
            media)    npx playwright test media/ ;;
            mobile)   npx playwright test mobile/ ;;
            themes)   npx playwright test themes/ ;;
            security) npx playwright test security/ ;;
            bugs)     npx playwright test bugs/ encoding-fix/ ;;
            all)      npx playwright test ;;
          esac

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
