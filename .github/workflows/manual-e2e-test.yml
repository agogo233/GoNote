name: Manual E2E Test Runner

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        type: choice
        options:
          - core
          - auth
          - notes
          - search
          - tags
          - folders
          - export
          - media
          - mobile
          - themes
          - security
          - bugs
          - all
        default: 'core'
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - local
          - production
        default: 'local'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start server
        run: |
          make run &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:9000 > /dev/null; do sleep 1; done' || echo "Server may not be ready"

      - name: Run E2E Tests
        env:
          AUTHENTICATION_ENABLED: true
          AUTHENTICATION_PASSWORD: test-admin-password
        run: |
          # Determine test pattern based on input
          if [ "${{ github.event.inputs.test_type }}" = "core" ]; then
            npx playwright test auth/ notes/crud.spec.ts search/search.spec.ts
          elif [ "${{ github.event.inputs.test_type }}" = "auth" ]; then
            npx playwright test auth/
          elif [ "${{ github.event.inputs.test_type }}" = "notes" ]; then
            npx playwright test notes/
          elif [ "${{ github.event.inputs.test_type }}" = "search" ]; then
            npx playwright test search/
          elif [ "${{ github.event.inputs.test_type }}" = "tags" ]; then
            npx playwright test tags/
          elif [ "${{ github.event.inputs.test_type }}" = "folders" ]; then
            npx playwright test folders/
          elif [ "${{ github.event.inputs.test_type }}" = "export" ]; then
            npx playwright test export/
          elif [ "${{ github.event.inputs.test_type }}" = "media" ]; then
            npx playwright test media/
          elif [ "${{ github.event.inputs.test_type }}" = "mobile" ]; then
            npx playwright test mobile/
          elif [ "${{ github.event.inputs.test_type }}" = "themes" ]; then
            npx playwright test themes/
          elif [ "${{ github.event.inputs.test_type }}" = "security" ]; then
            npx playwright test security/
          elif [ "${{ github.event.inputs.test_type }}" = "bugs" ]; then
            npx playwright test bugs/ encoding-fix/
          elif [ "${{ github.event.inputs.test_type }}" = "all" ]; then
            npx playwright test
          fi

      - name: Stop server
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7