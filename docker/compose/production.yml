services:
  gonote:
    image: ghcr.io/gamosoft/gonote:go
    container_name: gonote
    # 以非 root 用户运行（与 Dockerfile 中 USER gonote 双保险）
    user: "10001:10001"
    ports:
      - "9000:9000"
    volumes:
# Required: Your notes
# 提示：宿主 ./data 目录建议 chown -R 10001:10001 ./data，
# 或以宿主 uid 运行：将上方 user 改为 "<host_uid>:<host_gid>"。
       - ./data:/app/data
       # Optional: Uncomment to customize (file/folder must exist with content!)
       # - ./go/config.yaml:/app/config.yaml
       # - ./shared/themes:/app/themes
       # - ./shared/locales:/app/locales
    restart: unless-stopped
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/readyz"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s